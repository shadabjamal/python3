name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:

      - name: short commt id
        shell: bash
        run: |
            echo "COMMIT_ID=${GITHUB_SHA::6}" >> "$GITHUB_ENV"

      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: shadab781/python-app:${{ env.COMMIT_ID }}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      - name: Install argocd 
        shell: bash
        run: |
            curl -k -sSL -O argocd-linux-amd64 https://argocd-server.argocd/download/argocd-linux-amd64
            chmod +x argocd
            sude mv ./argocd /usr/local/bin/argocd
      - name: Argocd Sync
        shell: bash
        run: |
            #Insall Argocd
            argocd login  argocd-server.argocd \
              --insecure \
              --grpc-web \
              --username admin \
              --password ${{ secrets.ARGOCD_PASSWORD }}
            argocd app sync python-app